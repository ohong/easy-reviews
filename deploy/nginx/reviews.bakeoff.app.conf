# reviews.bakeoff.app — Easy Google Reviews (Next.js 16, standalone)
# Lives on the box at /opt/apps/proxy/conf.d/reviews.bakeoff.app.conf
# Direct A record → this origin (no Cloudflare). Cert: Let's Encrypt (certbot webroot).
#
# Do NOT add this file to conf.d until BOTH are true, or `nginx -s reload` fails
# for every site: (1) the cert exists at the path below, (2) the `reviews`
# container is running on proxy-net. See DEPLOY.md.

upstream reviews_app {
    server reviews:3000;   # container_name:port, resolved over proxy-net
}

server {
    listen 443 ssl;
    http2 on;
    server_name reviews.bakeoff.app;

    ssl_certificate     /etc/letsencrypt/live/reviews.bakeoff.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/reviews.bakeoff.app/privkey.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Server Actions (resolve + review generation) drive the app; allow bursts.
    limit_req zone=api burst=40 nodelay;

    # Next.js fingerprints these filenames — safe to cache hard.
    location /_next/static/ {
        proxy_pass http://reviews_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location / {
        proxy_pass http://reviews_app;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 30s;
        proxy_send_timeout    30s;
        # Review generation calls Anthropic server-side inside the request; give
        # the upstream room before nginx times out.
        proxy_read_timeout    120s;
    }
}
