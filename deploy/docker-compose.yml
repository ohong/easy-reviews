# easy-reviews — production compose stack for the shared EC2 host.
# Lives on the box at /opt/apps/reviews/docker-compose.yml (see DEPLOY.md).
# Mirrors the hardening in /opt/apps/readme.md and the Next.js precedents on the
# box (job-posting-web, carrier-helper-web), adapted for an app that needs
# outbound internet (Anthropic + Google Places) and stores SQLite on a volume.
services:
  reviews:
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION:-us-east-1}.amazonaws.com/apps/reviews:${TAG:-latest}
    container_name: reviews
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # The SQLite file lives on the named volume, never in the image, so it
      # survives `docker compose up --build`, redeploys, and reboots.
      DATABASE_URL: file:/data/app.db
    volumes:
      - reviews_data:/data

    # --- SECURITY (per /opt/apps/readme.md) ---
    read_only: true                 # immutable root FS; only /data + tmpfs are writable
    security_opt:
      - no-new-privileges:true      # no setuid/setgid privilege escalation
    cap_drop:
      - ALL                         # drop every Linux capability

    # --- WRITABLE DIRS (ephemeral, in RAM) ---
    # /tmp:            general scratch.
    # /app/.next/cache: Next.js ISR/fetch cache is disk-backed by default; the
    #                   root FS is read-only, so redirect it to tmpfs.
    tmpfs:
      - /tmp:size=50M,noexec,nosuid
      - /app/.next/cache:size=100M

    # --- RESOURCE LIMITS (ceilings, not reservations) ---
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
          pids: 150

    # --- HEALTH CHECK (node http GET /health; node:slim has no curl) ---
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    # proxy-net ONLY. Rationale: this app needs outbound HTTPS to Anthropic and
    # Google Places AND must be reachable by nginx. It has no sidecar DB to
    # isolate (SQLite is a local file on the volume), so there is deliberately no
    # `internal: true` network here — that would kill the egress the core flow
    # needs. proxy-net is a normal bridge (NAT egress) shared only with nginx.
    networks:
      - proxy

volumes:
  reviews_data:
    name: reviews_data

networks:
  proxy:
    external: true
    name: proxy-net
